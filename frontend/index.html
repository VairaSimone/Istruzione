<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: http: https:; media-src 'self' http: https:; connect-src 'self' http: https: ws: wss:;"    />
    <meta
      name="description"
      content="Piattaforma per studenti e insegnanti di lingua giapponese."
    />
    <title>Piattaforma Giapponese</title>
    <!--
      Bootstrap del tema (anti-FOUC): imposta `data-theme` su <html> in modo
      SINCRONO prima del primo paint, così non c'è alcun lampeggio di tema al
      caricamento. La logica e la chiave ('app_tema') DEVONO restare allineate
      a src/store/themeStore.js (THEME_STORAGE_KEY). Consentito dalla CSP
      (script-src 'unsafe-inline').
    -->
    <script>
      (function () {
        try {
          var KEY = 'app_tema';
          var stored = localStorage.getItem(KEY);
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia &&
                  window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
